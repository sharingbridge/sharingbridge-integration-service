# Render Blueprint — deploy AFTER user-service and ai-orchestration.
# Paste AUTH_TOKEN_SECRET, USER_SERVICE_BASE_URL, AI_ORCHESTRATION_BASE_URL manually.
# Guide: https://github.com/sharingbridge/sharingbridge/blob/main/configuration/backend-render.md
services:
  - type: web
    name: sharingbridge-integration-service
    runtime: node
    plan: free
    branch: main
    autoDeploy: true
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: AUTH_TOKEN_ISSUER
        value: sharingbridge-user-service
      - key: AUTH_TOKEN_AUDIENCE
        value: sharingbridge-clients
      - key: AUTH_TOKEN_SECRET
        sync: false
      - key: USER_SERVICE_BASE_URL
        sync: false
      - key: AI_ORCHESTRATION_BASE_URL
        sync: false
      - key: AI_ORCHESTRATION_INTERNAL_API_KEY
        generateValue: true
      - key: AI_ORCHESTRATION_SUGGEST_VENDORS_TIMEOUT_MS
        value: "15000"
      - key: AI_ORCHESTRATION_INSTRUCTION_PACK_TIMEOUT_MS
        value: "60000"
      - key: AI_SUGGEST_VENDORS_ENABLED
        value: "true"
      - key: AI_INSTRUCTION_PACK_ENABLED
        value: "true"
      - key: DONOR_NEIGHBOURHOOD_WINDOW_HOURS
        value: "2"
      - key: DONOR_NEIGHBOURHOOD_RADIUS_M
        value: "5000"
      - key: DONOR_LOCALITY_GRID_DECIMALS
        value: "2"
      - key: WEB_CORS_ORIGINS
        sync: false
